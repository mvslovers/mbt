# Reusable build workflow for mbt v2 (cc370 host build) projects.
#
# No MVS: builds + installs the cc370 toolchain on the runner, then runs
# the host build (compile -> link -> library). MVS is only touched by
# `make deploy`, which CI does not run.
#
# Usage in consumer project (.github/workflows/build.yml):
#
#   on:
#     pull_request:
#     push:
#       branches: [main]
#
#   jobs:
#     build:
#       uses: mvslovers/mbt/.github/workflows/build.yml@main
#
# Legacy (v1, mvsMF/JCL) projects use build-legacy.yml instead.

name: Build

on:
  workflow_call:
    inputs:
      cc370_ref:
        description: "cc370 git ref (branch or tag) to build the toolchain from"
        type: string
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Clone cc370
        run: |
          git clone --depth 1 --branch "${{ inputs.cc370_ref }}" \
            https://github.com/mvslovers/cc370.git /tmp/cc370
          echo "CC370_SHA=$(git -C /tmp/cc370 rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache cc370 toolchain
        id: cc370-cache
        uses: actions/cache@v5
        with:
          path: ~/.local
          key: cc370-${{ runner.os }}-${{ env.CC370_SHA }}

      - name: Build + install cc370 toolchain
        if: steps.cc370-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex
          make -C /tmp/cc370 install PREFIX="$HOME/.local"

      - name: Add cc370 to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build modules
        run: make

      - name: Build tests
        run: make test

      - name: Build library
        run: make lib
