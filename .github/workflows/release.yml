# Reusable release workflow for mbt v2 (cc370 host build) projects.
#
# Triggered on version tags (v*). Builds + installs the cc370 toolchain,
# runs `make package`, and creates a GitHub Release with dist/* as assets.
# No MVS involved.
#
# Usage in consumer project (.github/workflows/release.yml):
#
#   on:
#     push:
#       tags: ["v*"]
#
#   jobs:
#     release:
#       uses: mvslovers/mbt/.github/workflows/release.yml@main
#
# Legacy (v1, mvsMF/JCL) projects use release-legacy.yml instead.

name: Release

on:
  workflow_call:
    inputs:
      cc370_ref:
        description: "cc370 git ref (branch or tag) to build the toolchain from"
        type: string
        default: "main"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag matches project version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python3 -c "import tomllib; \
          print(tomllib.load(open('project.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "[mbt] ERROR: tag v$TAG does not match project.toml version $PROJECT_VERSION"
            exit 1
          fi

      - name: Clone toolchain (cc370 + libc370)
        run: |
          git clone --depth 1 --branch "${{ inputs.cc370_ref }}" \
            https://github.com/mvslovers/cc370.git /tmp/cc370
          git clone --depth 1 \
            https://github.com/mvslovers/libc370.git /tmp/libc370
          echo "TC_KEY=$(git -C /tmp/cc370 rev-parse HEAD)-$(git -C /tmp/libc370 rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache toolchain (cc370 compiler + libc370 sysroot)
        id: tc-cache
        uses: actions/cache@v5
        with:
          path: ~/.local
          key: cc370-${{ runner.os }}-${{ env.TC_KEY }}

      - name: Build + install toolchain
        if: steps.tc-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex
          # 1. compiler + tools (cc370/as370/ld370/ar370)
          make -C /tmp/cc370 install PREFIX="$HOME/.local"
          export PATH="$HOME/.local/bin:$PATH"
          # 2. libc370 sysroot (headers, crt*.o, libc.a, macros); built with cc370
          make -C /tmp/libc370 install

      - name: Add cc370 to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Package
        run: make package

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          # Delete every existing release for this tag (published or draft),
          # by id, keeping the git tag. A prerelease re-pushes the same dev
          # tag, so the release must be recreated cleanly; deleting by id
          # also clears stale drafts that would cause 'already_exists'.
          gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq ".[] | select(.tag_name==\"$TAG\") | .id" | while read -r id; do
            [ -n "$id" ] && gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
          done
          PRERELEASE=""
          case "$TAG" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$TAG" $PRERELEASE --title "$TAG" \
            --generate-notes dist/*
