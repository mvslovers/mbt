# Reusable release workflow for mbt v2 (cc370 host build) projects.
#
# Triggered on version tags (v*). Builds + installs the cc370 toolchain,
# runs `make package`, and creates a GitHub Release with dist/* as assets.
# No MVS involved.
#
# Usage in consumer project (.github/workflows/release.yml):
#
#   on:
#     push:
#       tags: ["v*"]
#
#   jobs:
#     release:
#       uses: mvslovers/mbt/.github/workflows/release.yml@main
#
# Legacy (v1, mvsMF/JCL) projects use release-legacy.yml instead.

name: Release

on:
  workflow_call:
    inputs:
      cc370_ref:
        description: "cc370 git ref (branch or tag) to build the toolchain from"
        type: string
        default: "main"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag matches project version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(python3 -c "import tomllib; \
          print(tomllib.load(open('project.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "[mbt] ERROR: tag v$TAG does not match project.toml version $PROJECT_VERSION"
            exit 1
          fi

      - name: Clone cc370
        run: |
          git clone --depth 1 --branch "${{ inputs.cc370_ref }}" \
            https://github.com/mvslovers/cc370.git /tmp/cc370
          echo "CC370_SHA=$(git -C /tmp/cc370 rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Cache cc370 toolchain
        id: cc370-cache
        uses: actions/cache@v5
        with:
          path: ~/.local
          key: cc370-${{ runner.os }}-${{ env.CC370_SHA }}

      - name: Build + install cc370 toolchain
        if: steps.cc370-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bison flex
          make -C /tmp/cc370 install PREFIX="$HOME/.local"

      - name: Add cc370 to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Package
        run: make package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
          generate_release_notes: true
